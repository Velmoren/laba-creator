<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" style="background-color: #f8f9fc; font-family: 'Segoe UI', Arial, sans-serif;">
  <style>
    .entity { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; rx: 8; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
    .entity-title { fill: #2c3e50; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: hanging; }
    .entity-pk { fill: #e67e22; font-weight: bold; }
    .entity-fk { fill: #2980b9; font-style: italic; }
    .attr-text { font-size: 10px; font-family: monospace; }
    .relation-line { stroke: #3498db; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .cardinality { fill: #e67e22; font-size: 9px; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7.5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#3498db" />
    </marker>
  </defs>
  
  <!-- Сертификат -->
  <rect x="220" y="20" width="260" height="180" class="entity" />
  <text x="350" y="38" class="entity-title">Сертификат</text>
  <line x1="230" y1="50" x2="470" y2="50" stroke="#bdc3c7" stroke-width="1" />
  <text x="230" y="65" class="attr-text"><tspan class="entity-pk">PK</tspan> id_сертификата</text>
  <text x="230" y="80" class="attr-text">номер_сертификата</text>
  <text x="230" y="95" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="230" y="110" class="attr-text"><tspan class="entity-fk">FK</tspan> id_курса</text>
  <text x="230" y="125" class="attr-text">дата_выдачи</text>
  <text x="230" y="140" class="attr-text">оценка</text>
  
  <!-- Связи к клиенту и курсу (символические) -->
  <path d="M 350 200 L 350 250 L 150 250" class="relation-line" stroke-dasharray="5,3" />
  <path d="M 350 200 L 350 250 L 550 250" class="relation-line" stroke-dasharray="5,3" />
  
  <text x="120" y="245" class="cardinality" style="fill: #16a085; font-size: 9px;">Клиент (1)</text>
  <text x="520" y="245" class="cardinality" style="fill: #16a085; font-size: 9px;">Курс (1)</text>
  <text x="360" y="190" class="cardinality">N:1</text>
</svg>