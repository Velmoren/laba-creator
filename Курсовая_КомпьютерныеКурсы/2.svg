<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" style="background-color: #f8f9fc; font-family: 'Segoe UI', Arial, sans-serif;">
  <style>
    .entity { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; rx: 8; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
    .entity-title { fill: #2c3e50; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: hanging; }
    .entity-pk { fill: #e67e22; font-weight: bold; }
    .entity-fk { fill: #2980b9; font-style: italic; }
    .attr-text { font-size: 10px; font-family: monospace; }
    .relation-line { stroke: #3498db; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .cardinality { fill: #e67e22; font-size: 9px; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7.5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#3498db" />
    </marker>
  </defs>
  
  <!-- Клиент -->
  <rect x="400" y="20" width="260" height="230" class="entity" />
  <text x="530" y="38" class="entity-title">Клиент</text>
  <line x1="410" y1="50" x2="650" y2="50" stroke="#bdc3c7" stroke-width="1" />
  <text x="410" y="65" class="attr-text"><tspan class="entity-pk">PK</tspan> id_клиента</text>
  <text x="410" y="80" class="attr-text">фамилия</text>
  <text x="410" y="95" class="attr-text">имя</text>
  <text x="410" y="110" class="attr-text">отчество</text>
  <text x="410" y="125" class="attr-text">дата_рождения</text>
  <text x="410" y="140" class="attr-text">телефон</text>
  <text x="410" y="155" class="attr-text">email</text>
  <text x="410" y="170" class="attr-text">адрес</text>
  <text x="410" y="185" class="attr-text">дата_регистрации</text>
  
  <!-- Договор -->
  <rect x="20" y="180" width="220" height="170" class="entity" />
  <text x="130" y="198" class="entity-title">Договор</text>
  <line x1="30" y1="210" x2="230" y2="210" stroke="#bdc3c7" stroke-width="1" />
  <text x="30" y="225" class="attr-text"><tspan class="entity-pk">PK</tspan> id_договора</text>
  <text x="30" y="240" class="attr-text">номер_договора</text>
  <text x="30" y="255" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="30" y="270" class="attr-text"><tspan class="entity-fk">FK</tspan> id_группы</text>
  <text x="30" y="285" class="attr-text">дата_заключения</text>
  <text x="30" y="300" class="attr-text">сумма</text>
  <text x="30" y="315" class="attr-text">статус</text>
  
  <!-- Оплата -->
  <rect x="20" y="380" width="220" height="150" class="entity" />
  <text x="130" y="398" class="entity-title">Оплата</text>
  <line x1="30" y1="410" x2="230" y2="410" stroke="#bdc3c7" stroke-width="1" />
  <text x="30" y="425" class="attr-text"><tspan class="entity-pk">PK</tspan> id_оплаты</text>
  <text x="30" y="440" class="attr-text"><tspan class="entity-fk">FK</tspan> id_договора</text>
  <text x="30" y="455" class="attr-text">дата_оплаты</text>
  <text x="30" y="470" class="attr-text">сумма</text>
  <text x="30" y="485" class="attr-text">способ_оплаты</text>
  <text x="30" y="500" class="attr-text">статус</text>
  
  <!-- Связи -->
  <path d="M 240 265 L 400 265" class="relation-line" />
  <text x="320" y="260" class="cardinality">N</text>
  <text x="380" y="260" class="cardinality">1</text>
  
  <path d="M 130 350 L 130 380" class="relation-line" />
  <text x="115" y="365" class="cardinality">1</text>
  <text x="115" y="375" class="cardinality">N</text>
  
  <text x="280" y="250" class="cardinality" style="fill: #16a085; font-size: 9px;">заключает</text>
  <text x="140" y="365" class="cardinality" style="fill: #16a085; font-size: 9px;">оплачивает</text>
</svg>