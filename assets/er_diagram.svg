<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <rect x="300" y="20" width="200" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="45" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Преподаватель</text>
  <line x1="300" y1="55" x2="500" y2="55" stroke="black" stroke-width="1"/>
  <text x="310" y="75" font-family="Arial" font-size="12">PK id_преподавателя</text>
  <text x="310" y="95" font-family="Arial" font-size="12">фамилия, имя, отчество</text>
  <text x="310" y="115" font-family="Arial" font-size="12">телефон, email</text>
  <text x="310" y="135" font-family="Arial" font-size="12">квалификация</text>

  <line x1="400" y1="170" x2="400" y2="220" stroke="black" stroke-width="2"/>
  <text x="410" y="200" font-family="Arial" font-size="12">1:N</text>

  <rect x="300" y="220" width="200" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="245" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Группа</text>
  <line x1="300" y1="255" x2="500" y2="255" stroke="black" stroke-width="1"/>
  <text x="310" y="275" font-family="Arial" font-size="12">PK id_группы</text>
  <text x="310" y="295" font-family="Arial" font-size="12">название</text>
  <text x="310" y="315" font-family="Arial" font-size="12">FK id_курса</text>
  <text x="310" y="335" font-family="Arial" font-size="12">FK id_преподавателя</text>

  <rect x="50" y="400" width="200" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="425" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Договор</text>
  <line x1="50" y1="435" x2="250" y2="435" stroke="black" stroke-width="1"/>
  <text x="60" y="455" font-family="Arial" font-size="12">PK id_договора</text>
  <text x="60" y="475" font-family="Arial" font-size="12">номер_договора</text>
  <text x="60" y="495" font-family="Arial" font-size="12">дата_заключения, сумма</text>

  <rect x="550" y="220" width="200" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="650" y="245" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Курс</text>
  <line x1="550" y1="255" x2="750" y2="255" stroke="black" stroke-width="1"/>
  <text x="560" y="275" font-family="Arial" font-size="12">PK id_курса</text>
  <text x="560" y="295" font-family="Arial" font-size="12">название, стоимость</text>

  <rect x="550" y="400" width="200" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="650" y="425" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Клиент</text>
  <line x1="550" y1="435" x2="750" y2="435" stroke="black" stroke-width="1"/>
  <text x="560" y="455" font-family="Arial" font-size="12">PK id_клиента</text>
  <text x="560" y="475" font-family="Arial" font-size="12">фамилия, имя, телефон</text>

  <line x1="500" y1="280" x2="550" y2="280" stroke="black" stroke-width="2"/>
  <line x1="150" y1="370" x2="300" y2="300" stroke="black" stroke-width="1" stroke-dasharray="5,5"/>

  <rect x="300" y="600" width="200" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="625" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Занятие</text>
  <line x1="300" y1="635" x2="500" y2="635" stroke="black" stroke-width="1"/>
  <text x="310" y="655" font-family="Arial" font-size="12">PK id_занятия</text>
  <text x="310" y="675" font-family="Arial" font-size="12">дата, время, тема</text>

  <line x1="400" y1="370" x2="400" y2="600" stroke="black" stroke-width="2"/>

  <rect x="300" y="800" width="200" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="825" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Успеваемость</text>
  <line x1="300" y1="835" x2="500" y2="835" stroke="black" stroke-width="1"/>
  <text x="310" y="855" font-family="Arial" font-size="12">id_клиента, id_занятия</text>
  <text x="310" y="875" font-family="Arial" font-size="12">оценка</text>

  <line x1="400" y1="720" x2="400" y2="800" stroke="black" stroke-width="2"/>
</svg>
