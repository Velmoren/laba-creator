<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" style="background-color: #f8f9fc; font-family: 'Segoe UI', Arial, sans-serif;">
  <style>
    .entity { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; rx: 8; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
    .entity-title { fill: #2c3e50; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: hanging; }
    .entity-pk { fill: #e67e22; font-weight: bold; }
    .entity-fk { fill: #2980b9; font-style: italic; }
    .attr-text { font-size: 10px; font-family: monospace; }
    .relation-line { stroke: #3498db; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .cardinality { fill: #e67e22; font-size: 9px; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7.5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#3498db" />
    </marker>
  </defs>
  
  <!-- Занятие -->
  <rect x="20" y="20" width="240" height="200" class="entity" />
  <text x="140" y="38" class="entity-title">Занятие</text>
  <line x1="30" y1="50" x2="250" y2="50" stroke="#bdc3c7" stroke-width="1" />
  <text x="30" y="65" class="attr-text"><tspan class="entity-pk">PK</tspan> id_занятия</text>
  <text x="30" y="80" class="attr-text"><tspan class="entity-fk">FK</tspan> id_группы</text>
  <text x="30" y="95" class="attr-text">номер_занятия</text>
  <text x="30" y="110" class="attr-text">дата_занятия</text>
  <text x="30" y="125" class="attr-text">время_начала</text>
  <text x="30" y="140" class="attr-text">время_конца</text>
  <text x="30" y="155" class="attr-text">аудитория</text>
  <text x="30" y="170" class="attr-text">тема_занятия</text>
  
  <!-- Посещаемость -->
  <rect x="310" y="280" width="220" height="150" class="entity" />
  <text x="420" y="298" class="entity-title">Посещаемость</text>
  <line x1="320" y1="310" x2="520" y2="310" stroke="#bdc3c7" stroke-width="1" />
  <text x="320" y="325" class="attr-text"><tspan class="entity-pk">PK</tspan> id_посещаемости</text>
  <text x="320" y="340" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="320" y="355" class="attr-text"><tspan class="entity-fk">FK</tspan> id_занятия</text>
  <text x="320" y="370" class="attr-text">статус</text>
  <text x="320" y="385" class="attr-text">причина</text>
  
  <!-- Успеваемость -->
  <rect x="590" y="280" width="220" height="150" class="entity" />
  <text x="700" y="298" class="entity-title">Успеваемость</text>
  <line x1="600" y1="310" x2="800" y2="310" stroke="#bdc3c7" stroke-width="1" />
  <text x="600" y="325" class="attr-text"><tspan class="entity-pk">PK</tspan> id_успеваемости</text>
  <text x="600" y="340" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="600" y="355" class="attr-text"><tspan class="entity-fk">FK</tspan> id_занятия</text>
  <text x="600" y="370" class="attr-text">оценка</text>
  <text x="600" y="385" class="attr-text">домашнее_задание</text>
  <text x="600" y="400" class="attr-text">проверено</text>
  
  <!-- Связи -->
  <path d="M 140 220 L 140 280 L 380 280" class="relation-line" />
  <text x="125" y="250" class="cardinality">1</text>
  <text x="360" y="275" class="cardinality">N</text>
  
  <path d="M 260 120 L 420 120 L 420 280" class="relation-line" />
  <text x="340" y="200" class="cardinality">1</text>
  <text x="405" y="270" class="cardinality">N</text>
  
  <path d="M 260 150 L 590 150 L 590 280" class="relation-line" />
  <text x="425" y="215" class="cardinality">1</text>
  <text x="575" y="270" class="cardinality">N</text>
  
  <text x="290" y="260" class="cardinality" style="fill: #16a085; font-size: 9px;">отметка</text>
  <text x="500" y="260" class="cardinality" style="fill: #16a085; font-size: 9px;">оценка</text>
</svg>