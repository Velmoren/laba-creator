<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" style="background-color: #f8f9fc; font-family: 'Segoe UI', 'Arial', sans-serif;">
  <style>
    .entity { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.5; rx: 8; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
    .entity-title { fill: #2c3e50; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: hanging; }
    .entity-pk { fill: #e67e22; font-weight: bold; }
    .entity-fk { fill: #2980b9; font-style: italic; }
    .attr-text { font-size: 10px; font-family: monospace; }
    .line { stroke: #7f8c8d; stroke-width: 1; stroke-dasharray: 5,3; }
    .relation-line { stroke: #3498db; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .relation-label { fill: #16a085; font-size: 9px; font-weight: bold; background: white; }
    .cardinality { fill: #e67e22; font-size: 9px; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7.5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#3498db" />
    </marker>
  </defs>

  <!-- Сущность: Преподаватель (x=50, y=30) -->
  <rect x="40" y="30" width="200" height="150" class="entity" />
  <text x="140" y="48" class="entity-title">Преподаватель</text>
  <line x1="50" y1="60" x2="230" y2="60" stroke="#bdc3c7" stroke-width="1" />
  <text x="50" y="75" class="attr-text"><tspan class="entity-pk">PK</tspan> id_преподавателя</text>
  <text x="50" y="90" class="attr-text">фамилия</text>
  <text x="50" y="105" class="attr-text">имя</text>
  <text x="50" y="120" class="attr-text">отчество</text>
  <text x="50" y="135" class="attr-text">телефон</text>
  <text x="50" y="150" class="attr-text">email</text>
  <text x="50" y="165" class="attr-text">квалификация</text>

  <!-- Сущность: Курс (x=900, y=30) -->
  <rect x="850" y="30" width="200" height="150" class="entity" />
  <text x="950" y="48" class="entity-title">Курс</text>
  <line x1="860" y1="60" x2="1040" y2="60" stroke="#bdc3c7" stroke-width="1" />
  <text x="860" y="75" class="attr-text"><tspan class="entity-pk">PK</tspan> id_курса</text>
  <text x="860" y="90" class="attr-text">название</text>
  <text x="860" y="105" class="attr-text">описание</text>
  <text x="860" y="120" class="attr-text">продолжительность</text>
  <text x="860" y="135" class="attr-text">стоимость</text>
  <text x="860" y="150" class="attr-text">уровень</text>
  <text x="860" y="165" class="attr-text"> </text>

  <!-- Сущность: Группа (x=350, y=190) -->
  <rect x="320" y="190" width="240" height="210" class="entity" />
  <text x="440" y="208" class="entity-title">Группа</text>
  <line x1="330" y1="220" x2="550" y2="220" stroke="#bdc3c7" stroke-width="1" />
  <text x="330" y="235" class="attr-text"><tspan class="entity-pk">PK</tspan> id_группы</text>
  <text x="330" y="250" class="attr-text">название</text>
  <text x="330" y="265" class="attr-text"><tspan class="entity-fk">FK</tspan> id_курса</text>
  <text x="330" y="280" class="attr-text"><tspan class="entity-fk">FK</tspan> id_преподавателя</text>
  <text x="330" y="295" class="attr-text">дата_начала</text>
  <text x="330" y="310" class="attr-text">дата_конца</text>
  <text x="330" y="325" class="attr-text">макс_размер</text>
  <text x="330" y="340" class="attr-text">статус</text>

  <!-- Сущность: Клиент (x=850, y=450) -->
  <rect x="820" y="450" width="260" height="210" class="entity" />
  <text x="950" y="468" class="entity-title">Клиент</text>
  <line x1="830" y1="480" x2="1070" y2="480" stroke="#bdc3c7" stroke-width="1" />
  <text x="830" y="495" class="attr-text"><tspan class="entity-pk">PK</tspan> id_клиента</text>
  <text x="830" y="510" class="attr-text">фамилия</text>
  <text x="830" y="525" class="attr-text">имя</text>
  <text x="830" y="540" class="attr-text">отчество</text>
  <text x="830" y="555" class="attr-text">дата_рождения</text>
  <text x="830" y="570" class="attr-text">телефон</text>
  <text x="830" y="585" class="attr-text">email</text>
  <text x="830" y="600" class="attr-text">адрес</text>
  <text x="830" y="615" class="attr-text">дата_регистр.</text>
  <text x="830" y="630" class="attr-text"> </text>

  <!-- Сущность: Договор (x=80, y=450) -->
  <rect x="40" y="450" width="200" height="150" class="entity" />
  <text x="140" y="468" class="entity-title">Договор</text>
  <line x1="50" y1="480" x2="230" y2="480" stroke="#bdc3c7" stroke-width="1" />
  <text x="50" y="495" class="attr-text"><tspan class="entity-pk">PK</tspan> id_договора</text>
  <text x="50" y="510" class="attr-text">номер_договора</text>
  <text x="50" y="525" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="50" y="540" class="attr-text"><tspan class="entity-fk">FK</tspan> id_группы</text>
  <text x="50" y="555" class="attr-text">дата_заключения</text>
  <text x="50" y="570" class="attr-text">сумма</text>
  <text x="50" y="585" class="attr-text">статус</text>

  <!-- Сущность: Оплата (x=40, y=670) -->
  <rect x="40" y="670" width="200" height="130" class="entity" />
  <text x="140" y="688" class="entity-title">Оплата</text>
  <line x1="50" y1="700" x2="230" y2="700" stroke="#bdc3c7" stroke-width="1" />
  <text x="50" y="715" class="attr-text"><tspan class="entity-pk">PK</tspan> id_оплаты</text>
  <text x="50" y="730" class="attr-text"><tspan class="entity-fk">FK</tspan> id_договора</text>
  <text x="50" y="745" class="attr-text">дата_оплаты</text>
  <text x="50" y="760" class="attr-text">сумма</text>
  <text x="50" y="775" class="attr-text">способ_оплаты</text>
  <text x="50" y="790" class="attr-text">статус</text>

  <!-- Сущность: Занятие (x=500, y=720) -->
  <rect x="480" y="720" width="240" height="170" class="entity" />
  <text x="600" y="738" class="entity-title">Занятие</text>
  <line x1="490" y1="750" x2="710" y2="750" stroke="#bdc3c7" stroke-width="1" />
  <text x="490" y="765" class="attr-text"><tspan class="entity-pk">PK</tspan> id_занятия</text>
  <text x="490" y="780" class="attr-text"><tspan class="entity-fk">FK</tspan> id_группы</text>
  <text x="490" y="795" class="attr-text">номер_занятия</text>
  <text x="490" y="810" class="attr-text">дата_занятия</text>
  <text x="490" y="825" class="attr-text">время_начала</text>
  <text x="490" y="840" class="attr-text">время_конца</text>
  <text x="490" y="855" class="attr-text">аудитория</text>
  <text x="490" y="870" class="attr-text">тема_занятия</text>

  <!-- Сущность: Посещаемость (x=820, y=720) -->
  <rect x="800" y="720" width="220" height="130" class="entity" />
  <text x="910" y="738" class="entity-title">Посещаемость</text>
  <line x1="810" y1="750" x2="1010" y2="750" stroke="#bdc3c7" stroke-width="1" />
  <text x="810" y="765" class="attr-text"><tspan class="entity-pk">PK</tspan> id_посещаемости</text>
  <text x="810" y="780" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="810" y="795" class="attr-text"><tspan class="entity-fk">FK</tspan> id_занятия</text>
  <text x="810" y="810" class="attr-text">статус</text>
  <text x="810" y="825" class="attr-text">причина</text>

  <!-- Сущность: Успеваемость (x=1060, y=720) -->
  <rect x="1040" y="720" width="220" height="130" class="entity" />
  <text x="1150" y="738" class="entity-title">Успеваемость</text>
  <line x1="1050" y1="750" x2="1250" y2="750" stroke="#bdc3c7" stroke-width="1" />
  <text x="1050" y="765" class="attr-text"><tspan class="entity-pk">PK</tspan> id_успеваемости</text>
  <text x="1050" y="780" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="1050" y="795" class="attr-text"><tspan class="entity-fk">FK</tspan> id_занятия</text>
  <text x="1050" y="810" class="attr-text">оценка</text>
  <text x="1050" y="825" class="attr-text">домашнее_задание</text>
  <text x="1050" y="840" class="attr-text">проверено</text>

  <!-- Сущность: Сертификат (x=1050, y=470) -->
  <rect x="1030" y="470" width="220" height="130" class="entity" />
  <text x="1140" y="488" class="entity-title">Сертификат</text>
  <line x1="1040" y1="500" x2="1240" y2="500" stroke="#bdc3c7" stroke-width="1" />
  <text x="1040" y="515" class="attr-text"><tspan class="entity-pk">PK</tspan> id_сертификата</text>
  <text x="1040" y="530" class="attr-text">номер_сертификата</text>
  <text x="1040" y="545" class="attr-text"><tspan class="entity-fk">FK</tspan> id_клиента</text>
  <text x="1040" y="560" class="attr-text"><tspan class="entity-fk">FK</tspan> id_курса</text>
  <text x="1040" y="575" class="attr-text">дата_выдачи</text>
  <text x="1040" y="590" class="attr-text">оценка</text>

  <!-- СВЯЗИ -->
  <!-- Преподаватель (1) -> Группа (N) -->
  <path d="M 240 105 L 300 105 L 300 280 L 320 280" class="relation-line" />
  <text x="270" y="100" class="cardinality">1</text>
  <text x="290" y="280" class="cardinality">N</text>
  
  <!-- Курс (1) -> Группа (N) -->
  <path d="M 850 105 L 800 105 L 800 280 L 560 280" class="relation-line" />
  <text x="820" y="100" class="cardinality">1</text>
  <text x="570" y="275" class="cardinality">N</text>

  <!-- Группа (1) -> Занятие (N) -->
  <path d="M 560 400 L 560 500 L 560 720" class="relation-line" />
  <text x="545" y="500" class="cardinality">1</text>
  <text x="545" y="710" class="cardinality">N</text>

  <!-- Группа (1) -> Договор (N) -->
  <path d="M 320 295 L 240 295 L 240 450" class="relation-line" />
  <text x="280" y="290" class="cardinality">1</text>
  <text x="250" y="440" class="cardinality">N</text>

  <!-- Клиент (1) -> Договор (N) -->
  <path d="M 820 555 L 500 555 L 240 555" class="relation-line" />
  <text x="670" y="550" class="cardinality">1</text>
  <text x="380" y="550" class="cardinality">N</text>
  
  <!-- Договор (1) -> Оплата (N) -->
  <path d="M 140 600 L 140 670" class="relation-line" />
  <text x="125" y="635" class="cardinality">1</text>
  <text x="125" y="660" class="cardinality">N</text>

  <!-- Клиент (1) -> Посещаемость (N) -->
  <path d="M 950 660 L 950 720" class="relation-line" />
  <text x="935" y="690" class="cardinality">1</text>
  <text x="935" y="710" class="cardinality">N</text>

  <!-- Занятие (1) -> Посещаемость (N) -->
  <path d="M 720 805 L 800 805" class="relation-line" />
  <text x="760" y="800" class="cardinality">1</text>
  <text x="790" y="800" class="cardinality">N</text>

  <!-- Клиент (1) -> Успеваемость (N) -->
  <path d="M 1050 630 L 1080 630 L 1080 720" class="relation-line" />
  <text x="1065" y="675" class="cardinality">1</text>
  <text x="1065" y="710" class="cardinality">N</text>

  <!-- Занятие (1) -> Успеваемость (N) -->
  <path d="M 720 850 L 1040 850" class="relation-line" />
  <text x="880" y="845" class="cardinality">1</text>
  <text x="1030" y="845" class="cardinality">N</text>
  
  <!-- Клиент (1) -> Сертификат (N) -->
  <path d="M 1080 610 L 1080 620 L 1120 620 L 1120 470" class="relation-line" />
  <text x="1100" y="545" class="cardinality">N</text>
  <text x="1100" y="600" class="cardinality">1</text>
  
  <!-- Курс (1) -> Сертификат (N) -->
  <path d="M 1050 170 L 1100 170 L 1100 470" class="relation-line" />
  <text x="1075" y="320" class="cardinality">1</text>
  <text x="1085" y="460" class="cardinality">N</text>

  <!-- Подписи связей (опционально) -->
  <text x="260" y="220" class="relation-label">преподает</text>
  <text x="680" y="250" class="relation-label">включает</text>
  <text x="500" y="470" class="relation-label">заключен</text>
  <text x="450" y="540" class="relation-label">клиент</text>
  <text x="110" y="645" class="relation-label">оплачивает</text>
  <text x="890" y="690" class="relation-label">отметка</text>
  <text x="850" y="830" class="relation-label">оценка</text>
</svg>